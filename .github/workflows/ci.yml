name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci


- name: Debug — token fingerprint (TEMPORARY)
        run: |
          echo "TOKEN first4: ${CONTENTFUL_ACCESS_TOKEN:0:4}"
          echo "TOKEN last4: ${CONTENTFUL_ACCESS_TOKEN: -4}"
          echo "SPACE first4: ${CONTENTFUL_SPACE_ID:0:4} last4: ${CONTENTFUL_SPACE_ID: -4}"
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.rczsnwq9z69e }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.arDmIjIfbNDr51bX5-xhU6jW1tmMNHk0BsWV1zUytV4 }}

      - name: Build
        run: npm run build
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.rczsnwq9z69e }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.arDmIjIfbNDr51bX5-xhU6jW1tmMNHk0BsWV1zUytV4 }}
