name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug — secret presence (TEMPORARY)
        run: |
          echo "SPACE_ID length: ${#CONTENTFUL_SPACE_ID}"
          echo "TOKEN length: ${#CONTENTFUL_ACCESS_TOKEN}"
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}

      - name: Build
        run: npm run build
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.rczsnwq9z69e }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.arDmIjIfbNDr51bX5-xhU6jW1tmMNHk0BsWV1zUytV4 }}
